<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin - Arbi Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a1d20;
            /* Latar belakang butik baju mewah yang elegan */
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), 
                              url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 15px;
        }

        .login-form {
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-form:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: rgba(13, 110, 253, 0.2);
            border: 1.5px solid rgba(13, 110, 253, 0.4);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(13, 110, 253, 0.15);
        }

        .login-form h2 {
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            color: #ffffff;
        }
        
        .form-floating > .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-radius: 12px;
            padding: 1rem 1rem;
            height: 60px;
        }

        .form-floating > .form-control:focus {
            background: rgba(15, 23, 42, 0.7);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
            color: #ffffff;
        }

        /* Styling label floating agar kontras di latar belakang gelap */
        .form-floating > label {
            color: rgba(255, 255, 255, 0.6);
            padding-left: 1rem;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #60a5fa !important;
            transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
        }

        .btn-primary {
            background: #2563eb;
            border: none;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 12px;
            border: none;
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            font-size: 0.9rem;
            text-align: left;
            border-left: 4px solid #ef4444;
        }

        .btn-close {
            filter: invert(1);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form text-center">
            <!-- Icon/Logo Brand Elegan -->
            <div class="brand-logo">
                <i class="fas fa-store"></i>
            </div>
            <h2 class="mb-1">Arbi Collection</h2>
            <p class="text-white-50 mb-4 small">Masuk untuk mengelola produk dan keuangan toko</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
                    <label for="username">Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i> Masuk Sekarang
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
